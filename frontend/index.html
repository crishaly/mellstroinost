<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Мой Тамагочи</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg: #0f172a;
      --card: #1e293b;
      --muted: rgba(255,255,255,.72);
      --muted2: rgba(255,255,255,.55);
      --line: rgba(255,255,255,.10);
      --btn: #e2e8f0;
      --btnText: #0f172a;
      --pill: rgba(255,255,255,.08);
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: white;
    }

    .wrap{
      max-width: 520px;
      margin: 0 auto;
      padding: 14px 14px calc(14px + env(safe-area-inset-bottom));
    }

    header{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    h1{
      margin:0;
      font-size: 18px;
      letter-spacing: .2px;
    }

    #status{
      font-size: 13px;
      color: var(--muted);
      margin: 8px 0 12px;
      line-height: 1.25;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--line);
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 12px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    #petName{
      font-weight: 650;
      font-size: 14px;
    }

    #levelInfo{
      font-size: 12px;
      color: var(--muted);
      background: var(--pill);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
    }

    .state{
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .stat{
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .bar{
      height: 12px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
      border: 1px solid var(--line);
    }

    .fill{
      height: 100%;
      width: 0%;
      background: #22c55e;
      transition: width 0.25s ease;
    }

    /* tabs (rooms) */
    .tabs{
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tab{
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--pill);
      border: 1px solid var(--line);
      color: var(--muted);
      cursor: pointer;
      user-select:none;
      font-size: 12px;
    }
    .tab.active{
      background: rgba(226,232,240,.18);
      color: #fff;
      border-color: rgba(226,232,240,.25);
    }

    /* actions */
    #actions{
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button{
      padding: 10px 12px;
      border-radius: 12px;
      border: 0;
      cursor: pointer;
      background: var(--btn);
      color: var(--btnText);
      font-weight: 650;
      font-size: 14px;
    }

    button:disabled{
      opacity: 0.55;
      cursor: not-allowed;
    }

    .hint{
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted2);
      line-height: 1.25;
    }

    /* debug */
    details{
      margin-top: 12px;
      color: var(--muted);
    }
    pre{
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(0,0,0,.22);
      border: 1px solid var(--line);
      padding: 10px;
      border-radius: 12px;
      margin: 10px 0 0;
      font-size: 12px;
      color: rgba(255,255,255,.88);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>🐾 Мой Тамагочи</h1>
      <div id="levelInfo">Уровень: — | XP: — | Монеты: —</div>
    </header>

    <div id="status">loading...</div>

    <div class="card">
      <div class="row">
        <div id="petName">Игрок: —</div>
      </div>

      <div class="petBox">
        <img id="petImg" src="./assets/pet_mid.jpg" alt="pet" />
        <div id="visualLabel">Состояние: —</div>
      </div>

      <div class="stat">
        🍔 Голод
        <div class="bar"><div id="hungerBar" class="fill"></div></div>
      </div>

      <div class="stat">
        😊 Настроение
        <div class="bar"><div id="moodBar" class="fill"></div></div>
      </div>

      <div class="stat">
        ⚡ Энергия
        <div class="bar"><div id="energyBar" class="fill"></div></div>
      </div>

      <div class="stat">
        🧼 Чистота
        <div class="bar"><div id="cleanBar" class="fill"></div></div>
      </div>

      <div class="hint">
        Подсказка: если слишком часто нажимать кнопки — сервер может вернуть <b>too fast</b> (кулдаун).
      </div>
    </div>

    <div class="card">
      <div style="font-weight:650; margin-bottom:10px;">Комнаты</div>
      <div class="tabs" id="roomTabs">
        <!-- JS заполнит -->
      </div>
    </div>

    <div class="card">
      <div style="font-weight:650; margin-bottom:10px;">Действия</div>
      <div id="actions"></div>
    </div>

    <details id="debugWrap">
      <summary>Debug</summary>
      <pre id="debug"></pre>
    </details>

    <script src="./app.js"></script>
  </div>
</body>
</html>
