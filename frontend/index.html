<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Мой Тамагочи</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #070b16;
      color: #fff;
      overflow: hidden;
    }

    .game{
      height: 100vh;
      display:flex;
      flex-direction: column;
    }

    /* ---------- TOP HUD ---------- */
    .hudTop{
      padding: 10px 12px calc(6px + env(safe-area-inset-top));
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }

    .hudLvl{
      flex:1;
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.16);
      backdrop-filter: blur(10px);
      min-width: 0;
    }

    .lvlBadge{
      font-weight: 900;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.10);
      white-space: nowrap;
    }

    .xpBar{
      flex:1;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.08);
      overflow:hidden;
    }
    .xpFill{
      height:100%;
      width:0%;
      border-radius: 999px;
      background: rgba(255,255,255,.85);
      transition: width .25s ease;
    }

    .hudCoins{
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.16);
      backdrop-filter: blur(10px);
      font-weight: 900;
      white-space: nowrap;
    }
    .coinIcon{ font-size: 18px; }

      /* --- FULLSCREEN SCENE BACKGROUND --- */
    .sceneWrap {
    flex: 1;
    padding: 0;
    margin: 0;
    position: relative;
  }

  .scene {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    border-radius: 0;
    overflow: hidden;
  }

    .scene--kitchen {
    background-image: url("./assets/bg_kitchen.jpg");
  }

  .scene--bedroom {
    background-image: url("./assets/bedroom.jpg");
  }

  .scene--bathroom {
    background-image: url("./assets/bg_bathroom.jpg");
  }

  .scene--playroom {
    background-image: url("./assets/bg_playroom.jpg");
  }

  /* Общие настройки фона */
  .scene--kitchen,
  .scene--bedroom,
  .scene--bathroom,
  .scene--playroom {
    background-size: cover;       /* Растягивает красиво */
    background-position: center;  /* Центрирует */
    background-repeat: no-repeat;
  }
    /* stats over pet */
    .statsOver{
      position:absolute;
      left: 10px;
      right: 10px;
      top: 10px;
      z-index: 5;
      pointer-events:none;
    }

    .playerRow{
      display:flex;
      justify-content:center;
      margin-bottom: 8px;
    }

    .player{
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,.9);
      max-width: 92%;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .statPills{
      display:flex;
      gap: 8px;
      justify-content: space-between;
    }

    .pillStat{
      flex:1;
      display:flex;
      align-items:center;
      gap: 6px;
      padding: 8px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
    }

    .miniBar{
      flex:1;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      overflow:hidden;
    }

    .miniFill{
      height:100%;
      width:0%;
      border-radius: 999px;
      transition: width .25s ease;
      background: rgba(255,255,255,.85);
    }

    /* pet center */
    .petStage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding-top: 38px;
    }

        /* убираем "коробку" вокруг питомца */
    .petBox{
      background: transparent !important;
      border: 0 !important;
      backdrop-filter: none !important;
      padding: 0 !important;
    }

    /* делаем питомца реально большим */
    #petImg{
      width: min(620px, 96vw) !important;
      max-height: 70vh;
      object-fit: contain;
    }

    #petImg.idle-breathe{
      animation: breathe 2.2s ease-in-out infinite;
    }
    @keyframes breathe{
      0%,100%{ transform: translateY(0) scale(1); }
      50%{ transform: translateY(-4px) scale(1.01); }
    }

    .visualLabel{
      font-size: 12px;
      color: rgba(255,255,255,.8);
    }

    #petFx{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    #foodEmoji{ animation: foodPulse 1.6s ease-in-out infinite; }
    @keyframes foodPulse{
      0%,100%{ transform: scale(1); }
      50%{ transform: scale(1.06); }
    }

    .fxPop{
      position:absolute;
      left:50%;
      top:35%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      animation: pop 900ms ease-out forwards;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,.25));
    }
    @keyframes pop{
      0%{ opacity:0; transform: translate(-50%,-50%) scale(.7); }
      15%{ opacity:1; }
      100%{ opacity:0; transform: translate(-50%,-120%) scale(1.15); }
    }

    /* ---------- BOTTOM ROOMS + ACTIONS ---------- */
    .hudRooms{ padding: 10px 12px 8px; }

    .tabs{
      display:flex;
      gap: 10px;
      justify-content: space-between;
    }

    .tab{
      flex: 1;
      display:flex;
      justify-content:center;
      align-items:center;
      height: 44px;
      border-radius: 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      color: rgba(255,255,255,.85);
      font-size: 20px;
      cursor:pointer;
      user-select:none;
    }
    .tab.active{
      background: rgba(255,255,255,.18);
      border-color: rgba(255,255,255,.22);
    }

    .actionBar{
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,.10);
      background: rgba(7,11,22,.75);
      backdrop-filter: blur(12px);
    }

    .actionBtns{
      display:flex;
      gap: 10px;
      justify-content: space-between;
    }

    .actionBtns button{
      flex: 1;
      border-radius: 14px;
      border: 0;
      padding: 12px 10px;
      font-weight: 800;
      background: #e2e8f0;
      color: #0b1226;
      cursor:pointer;
    }
    .actionBtns button:disabled{ opacity:.55; cursor:not-allowed; }

    /* ---------- overlays ---------- */
    .overlay{
      position: fixed;
      inset:0;
      background: rgba(0,0,0,.55);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 14px;
      z-index: 50;
    }

    .modal{
      width: min(520px, 92vw);
      background: rgba(20,28,50,.92);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 14px;
      backdrop-filter: blur(14px);
    }

    .pillBtn{
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.08);
      color: white;
      border-radius: 12px;
      padding: 10px 12px;
      cursor:pointer;
      backdrop-filter: blur(10px);
    }

    .mainBtn{
      border-radius: 14px;
      border: 0;
      padding: 12px 10px;
      font-weight: 800;
      background: #e2e8f0;
      color: #0b1226;
      cursor:pointer;
    }

    .hint{
      font-size: 12px;
      color: rgba(255,255,255,.65);
      line-height: 1.25;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }

    /* toast */
    .toast{
      position: fixed;
      left: 50%;
      top: calc(12px + env(safe-area-inset-top));
      transform: translateX(-50%);
      z-index: 80;
      max-width: 92vw;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(12px);
      color: rgba(255,255,255,.92);
      font-size: 12px;
      display:none;
    }

    details.debug{
      position: fixed;
      left: 12px;
      bottom: 80px;
      z-index: 60;
      max-width: 92vw;
      color: rgba(255,255,255,.75);
    }
    pre{
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.10);
      padding: 10px;
      border-radius: 12px;
      margin: 10px 0 0;
      font-size: 12px;
      color: rgba(255,255,255,.88);
    }
        html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
    }

    .game {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
    }
      </style>
</head>

<body>
  <div class="game">

    <!-- TOP HUD -->
    <div class="hudTop">
      <div class="hudLvl">
        <div class="lvlBadge">Lv <span id="lvlNum">1</span></div>
        <div class="xpBar"><div id="xpFill" class="xpFill"></div></div>
      </div>

      <div class="hudCoins">
        <span class="coinIcon">🪙</span>
        <span id="coinsNum">0</span>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- SCENE -->
    <div class="sceneWrap">
      <div class="scene scene--kitchen" id="scene">

        <div class="statsOver">
          <div class="statPills">
            <div class="pillStat"><span>🍔</span><div class="miniBar"><div id="hungerBar" class="miniFill"></div></div></div>
            <div class="pillStat"><span>😊</span><div class="miniBar"><div id="moodBar" class="miniFill"></div></div></div>
            <div class="pillStat"><span>⚡</span><div class="miniBar"><div id="energyBar" class="miniFill"></div></div></div>
            <div class="pillStat"><span>🧼</span><div class="miniBar"><div id="cleanBar" class="miniFill"></div></div></div>
          </div>
        </div>

        <div class="petStage">
          <div class="petBox">
            <img id="petImg" src="./assets/mid.jpg" alt="pet" />
            <div id="petFx"></div>
          </div>
        </div>

      </div>
    </div>

    <!-- ROOMS -->
    <div class="hudRooms">
      <div class="tabs" id="roomTabs"></div>
    </div>

    <!-- ACTIONS -->
    <div class="actionBar">
      <div id="actions" class="actionBtns"></div>
    </div>

    <!-- FOOD overlay -->
    <div class="overlay" id="foodScreen" style="display:none;">
      <div class="modal">
        <div class="row" style="margin-bottom:10px;">
          <div style="font-weight:800;">🍽️ Выбор еды</div>
          <button id="foodExitBtn" type="button" class="pillBtn">✖</button>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
          <button id="foodPrevBtn" type="button" class="pillBtn">←</button>

          <div style="flex:1; text-align:center;">
            <div id="foodEmoji" style="font-size:64px; line-height:1;">🍎</div>
            <div id="foodName" style="margin-top:6px; font-weight:800;">—</div>
            <div id="foodDesc" style="margin-top:4px; color: rgba(255,255,255,.72); font-size:12px;">—</div>
            <div id="foodMeta" style="margin-top:6px; color: rgba(255,255,255,.72); font-size:12px;">Цена: — • В наличии: —</div>
          </div>

          <button id="foodNextBtn" type="button" class="pillBtn">→</button>
        </div>

        <div style="display:flex; gap:10px; margin-top:12px;">
          <button id="foodFeedBtn" type="button" class="mainBtn" style="flex:1;">—</button>
        </div>
      </div>
    </div>

    <!-- DAILY popup -->
    <div class="overlay" id="dailyPopup" style="display:none;">
      <div class="modal">
        <div class="row" style="margin-bottom:10px;">
          <div style="font-weight:800;">🎁 Ежедневная награда</div>
          <button id="dailyCloseBtn" type="button" class="pillBtn">✖</button>
        </div>

        <div class="hint" style="margin-bottom:12px;">
          Забери монеты один раз в сутки.
        </div>

        <button id="dailyClaimBtn" type="button" class="mainBtn" style="width:100%;">Получить</button>

        <div id="dailyPopupHint" class="hint" style="margin-top:10px;">—</div>
      </div>
    </div>

    <details id="debugWrap" class="debug">
      <summary>Debug</summary>
      <pre id="debug"></pre>
    </details>

    <script src="./app.js"></script>
  </div>
</body>
</html>
