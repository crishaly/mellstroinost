<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Мой Тамагочи</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      font-family: system-ui;
      margin: 16px;
      background: #0f172a;
      color: white;
    }

    h1 {
      margin-bottom: 16px;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .stat {
      margin-bottom: 12px;
    }

    .bar {
      height: 12px;
      background: #334155;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 4px;
    }

    .fill {
      height: 100%;
      background: #22c55e;
      transition: width 0.3s ease;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      padding: 10px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #e2e8f0;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #status {
      margin-bottom: 10px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <h1>🐾 Мой Тамагочи</h1>

  <div id="status">loading...</div>

  <div class="card">
    <div id="petName"></div>

    <div class="stat">
      🍔 Голод
      <div class="bar"><div id="hungerBar" class="fill"></div></div>
    </div>

    <div class="stat">
      😊 Настроение
      <div class="bar"><div id="moodBar" class="fill"></div></div>
    </div>

    <div class="stat">
      ⚡ Энергия
      <div class="bar"><div id="energyBar" class="fill"></div></div>
    </div>

    <div class="stat">
      🧼 Чистота
      <div class="bar"><div id="cleanBar" class="fill"></div></div>
    </div>

    <div id="stateText"></div>
  </div>

  <div class="buttons" id="actions"></div>

  <script src="./app.js"></script>
</body>
</html>
